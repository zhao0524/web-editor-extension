<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }

    h2 {
      font-size: 15px;
      margin: 0 0 12px;
      color: #e0e0e0;
      text-align: center;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 34px;
      max-height: 120px;
      padding: 8px 10px;
      margin-bottom: 10px;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
      outline: none;
      resize: none;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    textarea:focus {
      border-color: #e94560;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #aiBtn {
      background: #7b2ff7;
    }

    #aiBtn:hover {
      background: #6522d4;
    }

    #aiBtn:disabled {
      background: #4a3a6a;
      cursor: wait;
    }

    #changeBtn {
      background: #e94560;
    }

    #changeBtn:hover {
      background: #c73650;
    }

    #status {
      font-size: 11px;
      text-align: center;
      color: #888;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h2>H1 Changer</h2>
  <textarea id="textInput" rows="1" placeholder="Type a prompt for AI, or text to apply…">Hello World</textarea>
  <div class="btn-row">
    <button id="aiBtn">Ask AI</button>
    <button id="changeBtn">Change H1</button>
  </div>
  <div id="status"></div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
