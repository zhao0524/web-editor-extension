<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 370px;
      height: 520px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 10px 14px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 14px;
      font-weight: 700;
    }

    #changeBtn {
      padding: 5px 12px;
      border: none;
      border-radius: 5px;
      background: #e94560;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #changeBtn:hover { background: #c73650; }

    #chatArea {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #7b2ff7;
      border-bottom-right-radius: 4px;
    }

    .msg.ai {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-bottom-left-radius: 4px;
      cursor: pointer;
      position: relative;
    }

    .msg.ai:hover { border-color: #e94560; }
    .msg.ai.selected { border-color: #e94560; background: #1e2a48; }

    .msg.ai .use-hint {
      display: none;
      position: absolute;
      top: -20px;
      right: 0;
      font-size: 10px;
      color: #e94560;
      background: #1a1a2e;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .msg.ai:hover .use-hint { display: block; }

    .typing {
      align-self: flex-start;
      color: #888;
      font-size: 12px;
      font-style: italic;
    }

    #inputArea {
      padding: 10px 14px;
      background: #16213e;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #msgInput {
      flex: 1;
      min-height: 36px;
      max-height: 100px;
      padding: 8px 10px;
      border: 1px solid #3a3a5c;
      border-radius: 8px;
      background: #0f1a30;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      resize: none;
      overflow-y: auto;
      transition: border-color 0.15s;
    }

    #msgInput:focus { border-color: #7b2ff7; }

    #sendBtn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #7b2ff7;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    #sendBtn:hover { background: #6522d4; }
    #sendBtn:disabled { background: #4a3a6a; cursor: wait; }

    #chatArea::-webkit-scrollbar { width: 5px; }
    #chatArea::-webkit-scrollbar-track { background: transparent; }
    #chatArea::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>H1 Changer</h1>
    <button id="changeBtn" title="Apply selected AI message to all H1s">Apply to H1</button>
  </header>

  <div id="chatArea"></div>

  <div id="inputArea">
    <textarea id="msgInput" rows="1" placeholder="Type a message…"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
