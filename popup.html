<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      padding: 16px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }

    h2 {
      font-size: 15px;
      margin: 0 0 12px;
      color: #e0e0e0;
      text-align: center;
    }

    button {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #c73650;
    }
  </style>
</head>
<body>
  <h2>H1 Changer</h2>
  <button id="changeBtn">Change H1 to Hello World</button>
  <script src="popup.js"></script>
</body>
</html>
