<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 380px;
      height: 540px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Header ---- */
    header {
      padding: 9px 14px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 700; }

    #undoBtn {
      padding: 4px 10px;
      border: 1px solid #3a3a5c;
      border-radius: 5px;
      background: transparent;
      color: #e0e0e0;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    #undoBtn:hover:not(:disabled) { background: #2a2a4a; border-color: #7b2ff7; }
    #undoBtn:disabled { opacity: .35; cursor: default; }

    /* ---- Chat area ---- */
    #chatArea {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .msg.user {
      align-self: flex-end;
      background: #7b2ff7;
      border-bottom-right-radius: 4px;
    }
    .msg.ai {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: #888;
      font-size: 11px;
      padding: 4px 0;
      text-align: center;
    }

    .typing {
      align-self: flex-start;
      color: #888;
      font-size: 12px;
      font-style: italic;
    }

    /* ---- Plan card ---- */
    .plan-card {
      align-self: stretch;
      background: #0f1a30;
      border: 1px solid #3a3a5c;
      border-radius: 10px;
      padding: 12px;
      font-size: 12px;
    }
    .plan-card.applied { border-color: #4caf50; opacity: .7; }
    .plan-card.discarded { border-color: #555; opacity: .45; }
    .plan-card.expired { opacity: .4; pointer-events: none; }

    .plan-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .plan-confidence { font-weight: 400; font-size: 11px; color: #4caf50; }
    .plan-confidence.low { color: #ff9800; }

    .plan-warning {
      background: #2a1f00;
      border: 1px solid #ff9800;
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 8px;
      font-size: 11px;
      color: #ffcc80;
    }

    .plan-action-item {
      background: #16213e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
    }
    .action-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
    }
    .action-type-label {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      color: #7b2ff7;
      letter-spacing: .5px;
    }
    .action-remove {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 14px;
      padding: 0 2px;
      line-height: 1;
    }
    .action-target {
      font-size: 11px;
      color: #888;
      font-family: "Cascadia Code", Consolas, monospace;
      margin-bottom: 2px;
    }
    .action-desc {
      font-size: 12px;
      margin-bottom: 5px;
      color: #bbb;
    }
    .action-value-input {
      width: 100%;
      padding: 5px 8px;
      background: #0f1a30;
      border: 1px solid #3a3a5c;
      border-radius: 4px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .action-value-input:focus { border-color: #7b2ff7; }

    .plan-btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .plan-btn-row button {
      flex: 1;
      padding: 7px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .plan-btn-row button:disabled { opacity: .5; cursor: default; }
    .plan-apply { background: #4caf50; color: #fff; }
    .plan-apply:hover:not(:disabled) { background: #43a047; }
    .plan-discard { background: #3a3a5c; color: #e0e0e0; }
    .plan-discard:hover:not(:disabled) { background: #4a4a6c; }

    /* ---- Input area ---- */
    #inputArea {
      padding: 10px 14px;
      background: #16213e;
      border-top: 1px solid #2a2a4a;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #msgInput {
      flex: 1;
      min-height: 36px;
      max-height: 100px;
      padding: 8px 10px;
      border: 1px solid #3a3a5c;
      border-radius: 8px;
      background: #0f1a30;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      resize: none;
      overflow-y: auto;
      transition: border-color 0.15s;
    }
    #msgInput:focus { border-color: #7b2ff7; }

    #sendBtn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #7b2ff7;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #sendBtn:hover { background: #6522d4; }
    #sendBtn:disabled { background: #4a3a6a; cursor: wait; }

    /* ---- Image attach ---- */
    .attach-btn {
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #888;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .attach-btn:hover { color: #e0e0e0; }

    #imagePreview {
      display: none;
      padding: 4px 14px 0;
      background: #16213e;
    }
    #imagePreview.visible { display: flex; align-items: center; gap: 8px; }

    .preview-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #3a3a5c;
    }
    .preview-remove {
      background: none;
      border: none;
      color: #e94560;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }
    .preview-name {
      font-size: 11px;
      color: #888;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .msg img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 6px;
      display: block;
    }

    /* ---- Scrollbar ---- */
    #chatArea::-webkit-scrollbar { width: 5px; }
    #chatArea::-webkit-scrollbar-track { background: transparent; }
    #chatArea::-webkit-scrollbar-thumb { background: #3a3a5c; border-radius: 3px; }
  </style>
</head>
<body>
  <header>
    <h1>Web Editor</h1>
    <button id="undoBtn" disabled>Undo</button>
  </header>

  <div id="chatArea"></div>

  <div id="imagePreview">
    <img class="preview-thumb" id="previewThumb" src="" alt="">
    <span class="preview-name" id="previewName"></span>
    <button class="preview-remove" id="previewRemove" title="Remove image">&times;</button>
  </div>

  <div id="inputArea">
    <input type="file" id="fileInput" accept="image/*" hidden>
    <button class="attach-btn" id="attachBtn" title="Attach screenshot">&#128206;</button>
    <textarea id="msgInput" rows="1" placeholder="Describe what to change…"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <script src="config.js"></script>
  <script src="schema.js"></script>
  <script src="popup.js"></script>
</body>
</html>
